<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <!--Main form for last name and first name-->
    <!--Redirects to the clientpage2.html using the get method which puts input in URL-->
    <form action="clientpage2.html" method="get">
        <!--Both inputs are required so that all three textboxes will have a value-->
        <!--First name textbox-->
        <label for="first-name">First Name:</label>
        <input type="text" name="first-name" id="first-name" required>
        <!--Last name textbox-->
        <label for="last-name">Last Name:</label>
        <input type="text" name="last-name" id="last-name" required>
        <!--A text box which will contain the users full name and has the readonly attribute-->
        <!--to prevent the user from editing directly-->
        <label for="full-name">Full Name:</label>
        <input type="text" name="full-name" id="full-name" readonly>

        <input type="submit">
        
    </form>
    <script src="main.js"></script>
</body>
</html>
